document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-2-500: #ef6853;\n  --color-accent-2-600: #c94b39;\n  --color-accent-2-700: #9e3526;\n  --color-accent-2-800: #71261b;\n  --color-accent-2-900: #471d16;\n\n  --font-heading: \"Archivo\", system-ui, sans-serif;\n  --font-heading-weight: 800;\n  --font-body: \"Archivo\", system-ui, sans-serif;\n\n  --space-1: 4.0px;\n  --space-2: 8.0px;\n  --space-3: 12.0px;\n  --space-4: 16.0px;\n  --space-6: 24.0px;\n  --space-8: 32.0px;\n\n  --radius-sm: 0px;\n  --radius-md: 0px;\n  --radius-lg: 0px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); justify-content: flex-start; text-align: left; }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle>\n  <script src=\"8ed4ef17-1383-416e-af31-b7a8f299263d\"><\u002Fscript>\n  <style>/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"881bc5d9-da7c-4c5b-8323-031ad4881d54\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"7c42123d-880d-495d-952a-75ed61885c88\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"982f0fda-9e20-4677-adc5-05f2ed74de4a\") format('woff2');\n  unicode-range: U px;margin:0 auto;padding:16px var(--edge);display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <a href=\"#hero\" style=\"font-family:var(--font-heading);font-weight:600;font-size:18px;color:var(--color-text);text-decoration:none;\">Daniel Moyal<\u002Fa>\n\n      <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:clamp(18px,2.4vw,32px);\">\n          <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <a href=\"{{ item.href }}\" style=\"font-size:14px;font-weight:500;text-decoration:none;color:{{ item.color }};padding-bottom:5px;border-bottom:2px solid {{ item.borderColor }};white-space:nowrap;\">{{ item.label }}<\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n        <button type=\"button\" aria-label=\"Toggle menu\" aria-expanded=\"{{ mobileMenuOpen }}\" onclick=\"{{ toggleMobileMenu }}\" style=\"width:42px;height:42px;border:1px solid var(--color-divider);background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;flex:none;\">\n          <span style=\"width:18px;height:1.5px;background:var(--color-text);\"><\u002Fspan>\n          <span style=\"width:18px;height:1.5px;background:var(--color-text);\"><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fnav>\n\n    <sc-if value=\"{{ mobileMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border-top:1px solid var(--color-divider);padding:8px var(--edge) 24px;display:flex;flex-direction:column;\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <a href=\"{{ item.href }}\" onclick=\"{{ closeMobileMenu }}\" style=\"padding:16px 0;font-size:17px;font-weight:500;text-decoration:none;color:var(--color-text);border-bottom:1px solid var(--color-divider);\">{{ item.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <main id=\"main\">\n\n  <!-- ============ HERO ============ -->\n  <section id=\"hero\" aria-label=\"Introduction\" style=\"position:relative;overflow:hidden;background:linear-gradient(135deg,var(--color-accent-900) 0%,var(--color-accent) 60%,#4A7A9E 100%);color:#fff;\">\n    <div style=\"position:absolute;top:-140px;right:-140px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.10) 0%,rgba(255,255,255,0) 70%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:absolute;bottom:-180px;left:-100px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0) 70%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1160px;margin:0 auto;padding:clamp(72px,11vw,150px) var(--edge) clamp(64px,9vw,110px);\">\n      <p style=\"font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.75);margin:0 0 22px;animation:fadeInUp .6s ease both;\">CRM Strategy · Lifecycle Marketing<\u002Fp>\n      <h1 style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(38px,5.4vw,66px);line-height:1.14;letter-spacing:-0.015em;margin:0 0 26px;max-width:16ch;color:#fff;animation:fadeInUp .6s ease .08s both;\">I design lifecycle journeys that adapt to customer behavior.<\u002Fh1>\n      <p style=\"font-size:19px;line-height:1.65;color:rgba(255,255,255,0.82);max-width:62ch;margin:0 0 40px;animation:fadeInUp .6s ease .16s both;\">I turn customer signals, service interactions and business rules into automated lifecycle journeys across CRM, e-commerce and customer service, from onboarding through retention.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;animation:fadeInUp .6s ease .32s both;\">\n        <a href=\"#work\" class=\"btn\" style=\"text-decoration:none;background:#fff;color:var(--color-accent-900);font-weight:600;animation:softPulse 2.2s ease-out 1s 3;display:inline-flex;align-items:center;gap:8px;\">View case studies<svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fa>\n        <a href=\"{{ linkedinUrl }}\" target=\"_blank\" rel=\"noopener\" class=\"btn\" style=\"text-decoration:none;border:1px solid rgba(255,255,255,0.55);color:#fff;display:inline-flex;align-items:center;gap:8px;\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6\"><\u002Fpath><polyline points=\"15 3 21 3 21 9\"><\u002Fpolyline><line x1=\"10\" y1=\"14\" x2=\"21\" y2=\"3\"><\u002Fline><\u002Fsvg>LinkedIn<\u002Fa>\n        <a href=\"{{ cvUrl }}\" target=\"_blank\" rel=\"noopener\" class=\"btn\" style=\"text-decoration:none;border:1px solid rgba(255,255,255,0.55);color:#fff;display:inline-flex;align-items:center;gap:8px;\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fline><\u002Fsvg>Download CV<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHAT I DO ============ -->\n  <section aria-label=\"What I do\" data-reveal=\"1\" style=\"background:var(--color-accent-100);\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:clamp(48px,7vw,80px) var(--edge);display:flex;flex-wrap:wrap;gap:48px;\">\n      <div style=\"flex:2 1 380px;min-width:0;\">\n        <h2 style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(24px,2.6vw,32px);letter-spacing:-0.01em;margin:0 0 16px;\">What I do<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.65;max-width:62ch;color:var(--color-text);margin:0;\">I work between business, CRM, marketing, service, data and technology, designing the rules behind a customer journey: who enters, what changes their path, when a channel switches, and when a message should stop. The output is a system that reacts to real customer behavior instead of a fixed send calendar.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 280px;display:grid;grid-template-columns:repeat(2,1fr);gap:22px;\">\n        <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n          <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:2px;\"><path d=\"M12 2 2 7l10 5 10-5-10-5z\"><\u002Fpath><path d=\"M2 17l10 5 10-5\"><\u002Fpath><path d=\"M2 12l10 5 10-5\"><\u002Fpath><\u002Fsvg>\n          <div><p style=\"font-size:14px;font-weight:600;margin:0 0 2px;\">Business to CRM logic<\u002Fp><p style=\"font-size:13.5px;color:var(--color-neutral-800);margin:0;\">Requirements become rules.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n          <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:2px;\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg>\n          <div><p style=\"font-size:14px;font-weight:600;margin:0 0 2px;\">Behavior-based orchestration<\u002Fp><p style=\"font-size:13.5px;color:var(--color-neutral-800);margin:0;\">Signals decide the next step.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n          <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:2px;\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg>\n          <div><p style=\"font-size:14px;font-weight:600;margin:0 0 2px;\">Cross-team alignment<\u002Fp><p style=\"font-size:13.5px;color:var(--color-neutral-800);margin:0;\">Marketing, service and technology, in sync.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n          <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:2px;\"><rect x=\"4\" y=\"4\" width=\"16\" height=\"16\" rx=\"2\"><\u002Frect><rect x=\"9\" y=\"9\" width=\"6\" height=\"6\"><\u002Frect><line x1=\"9\" y1=\"1\" x2=\"9\" y2=\"4\"><\u002Fline><line x1=\"15\" y1=\"1\" x2=\"15\" y2=\"4\"><\u002Fline><line x1=\"9\" y1=\"20\" x2=\"9\" y2=\"23\"><\u002Fline><line x1=\"15\" y1=\"20\" x2=\"15\" y2=\"23\"><\u002Fline><line x1=\"20\" y1=\"9\" x2=\"23\" y2=\"9\"><\u002Fline><line x1=\"20\" y1=\"14\" x2=\"23\" y2=\"14\"><\u002Fline><line x1=\"1\" y1=\"9\" x2=\"4\" y2=\"9\"><\u002Fline><line x1=\"1\" y1=\"14\" x2=\"4\" y2=\"14\"><\u002Fline><\u002Fsvg>\n          <div><p style=\"font-size:14px;font-weight:600;margin:0 0 2px;\">AI-augmented work<\u002Fp><p style=\"font-size:13.5px;color:var(--color-neutral-800);margin:0;\">Better decisions through AI assistance.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SELECTED CASE STUDIES OVERVIEW ============ -->\n  <section id=\"work\" aria-label=\"Selected case studies overview\" data-reveal=\"1\" style=\"max-width:1160px;margin:0 auto;padding:clamp(56px,8vw,96px) var(--edge) clamp(28px,4vw,48px);\">\n    <h2 style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(26px,3vw,38px);letter-spacing:-0.01em;margin:0 0 36px;\">Selected Case Studies<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;\">\n      <a href=\"#case-studies\" onclick=\"{{ goCase1 }}\" style=\"text-decoration:none;color:inherit;position:relative;overflow:hidden;border:1px solid var(--color-divider);background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:30px 28px 28px;display:flex;flex-direction:column;transition:transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s ease;\" style-hover=\"transform:translateY(-6px);box-shadow:var(--shadow-md);\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--color-accent-900),var(--color-accent));\"><\u002Fdiv>\n        <p style=\"font-family:var(--font-heading);font-weight:700;font-size:15px;color:var(--color-accent);margin:0 0 10px;\">01<\u002Fp>\n        <h3 style=\"font-family:var(--font-heading);font-weight:600;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px;\">Multi-Channel Onboarding Journey<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:var(--color-neutral-800);margin:0 0 14px;\">Six-month onboarding and retention journey influenced by website activity, service interactions, purchases and customer status.<\u002Fp>\n        <p style=\"font-size:13px;color:var(--color-text);margin:0 0 16px;\">Mapped the six-month behavior-driven journey<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;\">\n          <span class=\"tag tag-accent\">Lifecycle design<\u002Fspan><span class=\"tag tag-neutral\">Behavior triggers<\u002Fspan><span class=\"tag tag-neutral\">Retention<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a href=\"#case-studies\" onclick=\"{{ goCase2 }}\" style=\"text-decoration:none;color:inherit;position:relative;overflow:hidden;border:1px solid var(--color-divider);background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:30px 28px 28px;display:flex;flex-direction:column;transition:transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s ease;\" style-hover=\"transform:translateY(-6px);box-shadow:var(--shadow-md);\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--color-accent-900),var(--color-accent));\"><\u002Fdiv>\n        <p style=\"font-family:var(--font-heading);font-weight:700;font-size:15px;color:var(--color-accent);margin:0 0 10px;\">02<\u002Fp>\n        <h3 style=\"font-family:var(--font-heading);font-weight:600;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px;\">CC2IQOS: Intent-Based Lead Nurturing<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:var(--color-neutral-800);margin:0 0 14px;\">Turning about 50,000 field leads into a scored, intent-based conversion journey across CRM and the service center.<\u002Fp>\n        <p style=\"font-size:13px;color:var(--color-text);margin:0 0 16px;\">Designed the intent-scoring and nurturing journey<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;\">\n          <span class=\"tag tag-accent\">Intent scoring<\u002Fspan><span class=\"tag tag-neutral\">Lead nurturing<\u002Fspan><span class=\"tag tag-neutral\">Conversion strategy<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CASE STUDY DETAIL ============ -->\n  <section id=\"case-studies\" aria-label=\"Case study detail\" style=\"padding-top:8px;\">\n    <div style=\"position:sticky;top:45px;z-index:40;background:var(--color-bg);border-top:1px solid var(--color-divider);border-bottom:1px solid var(--color-divider);\">\n      <div role=\"tablist\" aria-label=\"Select a case study\" style=\"max-width:1160px;margin:0 auto;padding:10px var(--edge);display:flex;gap:6px;overflow-x:auto;\">\n        <button type=\"button\" role=\"tab\" aria-selected=\"{{ case1Active }}\" onclick=\"{{ goCase1 }}\" style=\"font-family:var(--font-heading);font-weight:600;font-size:14px;border:0;border-radius:var(--radius-md);padding:10px 18px;background:{{ case1TabBg }};color:{{ case1TabColor }};cursor:pointer;white-space:nowrap;transition:background .15s ease;\">01. Onboarding<\u002Fbutton>\n        <button type=\"button\" role=\"tab\" aria-selected=\"{{ case2Active }}\" onclick=\"{{ goCase2 }}\" style=\"font-family:var(--font-heading);font-weight:600;font-size:14px;border:0;border-radius:var(--radius-md);padding:10px 18px;background:{{ case2TabBg }};color:{{ case2TabColor }};cursor:pointer;white-space:nowrap;transition:background .15s ease;\">02. CC2IQOS<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ---- CASE 1: HYPERCARE ---- -->\n    <sc-if value=\"{{ case1Active }}\" hint-placeholder-val=\"{{ true }}\">\n    <article role=\"tabpanel\" aria-label=\"Case Study 01\" style=\"max-width:1160px;margin:0 auto;padding:clamp(40px,6vw,64px) var(--edge) clamp(56px,8vw,80px);\">\n      <h2 style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(26px,3vw,34px);letter-spacing:-0.01em;margin:0 0 12px;\">Multi-Channel Onboarding<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:var(--color-neutral-800);max-width:66ch;margin:0 0 24px;\">A six-month onboarding and retention journey that changed according to customer behavior rather than one fixed communication calendar.<\u002Fp>\n\n      <p style=\"font-size:14.5px;line-height:1.65;max-width:70ch;color:var(--color-neutral-800);background:var(--color-accent-100);border-radius:var(--radius-md);padding:14px 18px;margin:0 0 36px;\">I currently work in B2C CRM for IQOS, a regulated consumer product with a direct-to-consumer e-commerce site, physical touchpoints and a customer-service center. My work connects customer behavior across the website, Salesforce CRM, marketing automation, e-commerce and the service center.<\u002Fp>\n\n      <h3 style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:0 0 10px;\">Challenge<\u002Fh3>\n      <p style=\"font-size:16px;line-height:1.65;max-width:70ch;margin:0 0 12px;\">Customers moved through onboarding at different speeds. Some acted quickly. Others needed more support. All of them interacted through more than one channel: the website, email, SMS and the customer-service center.<\u002Fp>\n      <p style=\"font-size:16px;line-height:1.65;max-width:70ch;margin:0 0 36px;\">A single scheduled sequence could not reflect that. A website action or a service call could make the next planned message irrelevant. The business needed one connected lifecycle, not separate channel campaigns.<\u002Fp>\n\n      <h3 style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:0 0 10px;\">What I designed<\u002Fh3>\n      <p style=\"font-size:16px;line-height:1.65;max-width:70ch;margin:0 0 16px;\">I mapped a six-month lifecycle around customer engagement and product adoption, rather than a fixed communication schedule. The Product Adoption Assessment acts as a structured CRM signal. Its outcome is recorded in the customer profile and determines the next communication, support action or lifecycle path.<\u002Fp>\n\n      \n      <h3 style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:0 0 16px;\">How the journey adapts to customer signals<\u002Fh3><div style=\"overflow-x:auto;padding:36px 0 8px;\">\n        <div style=\"display:flex;min-width:720px;position:relative;\">\n          <div style=\"position:absolute;top:22px;left:44px;right:44px;height:2px;background:var(--color-accent-200);z-index:0;\"><\u002Fdiv>\n\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 6px;animation:fadeInUp .5s ease both;animation-delay:0ms;\">\n            <div style=\"width:44px;height:44px;border-radius:50%;background:#0B2545;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M2 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2\"><\u002Fpath><line x1=\"19\" y1=\"8\" x2=\"19\" y2=\"14\"><\u002Fline><line x1=\"22\" y1=\"11\" x2=\"16\" y2=\"11\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:12.5px;font-weight:600;line-height:1.3;margin:14px 0 0;text-align:center;max-width:112px;color:var(--color-text);\">Customer onboarding<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 6px;animation:fadeInUp .5s ease both;animation-delay:100ms;\">\n            <div style=\"width:44px;height:44px;border-radius:50%;background:#0E7490;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:12.5px;font-weight:600;line-height:1.3;margin:14px 0 0;text-align:center;max-width:112px;color:var(--color-text);\">Engagement check<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 6px;animation:fadeInUp .5s ease both;animation-delay:200ms;\">\n            <div style=\"width:44px;height:44px;border-radius:50%;background:var(--color-accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-4.7 7.6 8.5 8.5 0 0 1-8.7-.6L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 1 1 17 0z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:12.5px;font-weight:600;line-height:1.3;margin:14px 0 0;text-align:center;max-width:112px;color:var(--color-text);\">Adoption conversation<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 6px;animation:fadeInUp .5s ease both;animation-delay:300ms;\">\n            <div style=\"width:44px;height:44px;border-radius:50%;background:#1E3A5F;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><ellipse cx=\"12\" cy=\"5\" rx=\"8\" ry=\"3\"><\u002Fellipse><path d=\"M4 5v14a8 3 0 0 0 16 0V5\"><\u002Fpath><path d=\"M4 12a8 3 0 0 0 16 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:12.5px;font-weight:600;line-height:1.3;margin:14px 0 0;text-align:center;max-width:112px;color:var(--color-text);\">CRM status updated<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 6px;animation:fadeInUp .5s ease both;animation-delay:400ms;\">\n            <div style=\"width:44px;height:44px;border-radius:50%;background:#2B6CB0;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"13 2 3 14 12 14 11 22 21 10 12 10 13 2\"><\u002Fpolygon><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:12.5px;font-weight:600;line-height:1.3;margin:14px 0 0;text-align:center;max-width:112px;color:var(--color-text);\">Personalized trigger<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 6px;animation:fadeInUp .5s ease both;animation-delay:500ms;\">\n            <div style=\"width:44px;height:44px;border-radius:50%;background:#0B2545;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"6\" y1=\"3\" x2=\"6\" y2=\"15\"><\u002Fline><circle cx=\"18\" cy=\"6\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle><path d=\"M18 9a9 9 0 0 1-9 9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:12.5px;font-weight:600;line-height:1.3;margin:14px 0 0;text-align:center;max-width:112px;color:var(--color-text);\">Journey adapts<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.6;color:var(--color-neutral-800);max-width:68ch;margin:0 0 24px;\">The engagement check draws on email and SMS activity, website behavior, purchases, service interactions and CRM status, not on any one signal alone.<\u002Fp>\n\n      <div style=\"border-left:3px solid var(--color-accent);padding:2px 0 2px 20px;margin-bottom:28px;\">\n        <p style=\"font-family:var(--font-heading);font-weight:600;font-size:18px;line-height:1.5;margin:0;max-width:48ch;\">Every meaningful website or customer-service interaction can change the customer's next digital step.<\u002Fp>\n      <\u002Fdiv>\n\n      <div role=\"group\" aria-label=\"Select a customer path\" style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;\">\n        <sc-for list=\"{{ personaList }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <button type=\"button\" aria-pressed=\"{{ p.active }}\" onclick=\"{{ p.select }}\" style=\"font-size:13px;font-weight:500;border-radius:var(--radius-md);padding:10px 16px;border:1px solid {{ p.border }};background:{{ p.bg }};color:{{ p.color }};cursor:pointer;transition:all .15s ease;\">{{ p.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-size:15px;line-height:1.6;min-height:44px;max-width:66ch;color:var(--color-text);margin:0 0 48px;\">{{ activePersonaDesc }}<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:40px;margin-bottom:48px;\">\n        <div>\n          <h3 style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:0 0 12px;\">My role<\u002Fh3>\n          <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Mapped the six-month onboarding and conversion lifecycle<\u002Fp>\n          <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Defined engagement checks, conversion statuses and customer milestones<\u002Fp>\n          <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Designed personalized triggers, journey branches and suppression rules<\u002Fp>\n          <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Connected website behavior and service-center outcomes with the digital journey<\u002Fp>\n          <p style=\"font-size:15.5px;line-height:1.7;margin:0 0 12px;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Managed development and implementation teams delivering the technical build<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:var(--color-neutral-800);margin:0;\">I defined the business, customer and CRM logic in coordination with local stakeholders and global technology teams responsible for technical implementation.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <h3 style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:0 0 12px;\">Why it matters for SaaS<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;max-width:60ch;margin:0 0 14px;\">This was not a SaaS product, but the same lifecycle logic applies to any product with an onboarding period.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:16px;\">\n            <p style=\"font-size:13.5px;margin:0;\">Joining <span style=\"color:var(--color-accent);\">→<\u002Fspan> Sign-up<\u002Fp>\n            <p style=\"font-size:13.5px;margin:0;\">First meaningful behavior <span style=\"color:var(--color-accent);\">→<\u002Fspan> Activation<\u002Fp>\n            <p style=\"font-size:13.5px;margin:0;\">Repeated behavior <span style=\"color:var(--color-accent);\">→<\u002Fspan> Adoption<\u002Fp>\n            <p style=\"font-size:13.5px;margin:0;\">Long-term engagement <span style=\"color:var(--color-accent);\">→<\u002Fspan> Retention<\u002Fp>\n          <\u002Fdiv>\n          <p style=\"font-family:var(--font-heading);font-weight:600;font-size:15.5px;line-height:1.5;max-width:52ch;margin:0;\">The product changes. The lifecycle challenge stays the same.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n    <\u002Fsc-if>\n\n    <!-- ---- CASE 2: CC2IQOS ---- -->\n    <sc-if value=\"{{ case2Active }}\" hint-placeholder-val=\"{{ false }}\">\n    <article role=\"tabpanel\" aria-label=\"Case Study 02\" style=\"max-width:1160px;margin:0 auto;padding:clamp(40px,6vw,64px) var(--edge) clamp(56px,8vw,80px);\">\n      <h2 style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(26px,3vw,34px);letter-spacing:-0.01em;margin:0 0 40px;max-width:22ch;\">CC2IQOS: Intent-Based Lead Nurturing<\u002Fh2>\n\n      <h3 style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:0 0 10px;\">Challenge<\u002Fh3>\n      <p style=\"font-size:16px;line-height:1.65;max-width:70ch;margin:0 0 32px;\">About 50,000 existing adult leads, collected through field activity, included consumers known to use competing cigarette brands. The business needed a way to identify genuine intent before investing in conversion messaging.<\u002Fp>\n\n      <h3 style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:0 0 10px;\">What I designed<\u002Fh3>\n      <p style=\"font-size:16px;line-height:1.65;max-width:70ch;margin:0 0 24px;\">Consumers completed a value-exchange engagement activity built around a short set of questions. Responses fed an intent-scoring model that classified each consumer as low, mid or high intent. Mid and high intent consumers entered a multichannel nurturing journey coordinated between CRM and the customer-service center: education on the product category, a one-click callback request, and a relevant offer introduced later in the journey.<\u002Fp>\n\n      <div style=\"overflow-x:auto;padding:36px 0 8px;\">\n        <div style=\"display:flex;min-width:900px;position:relative;\">\n          <div style=\"position:absolute;top:20px;left:40px;right:40px;height:2px;background:var(--color-accent-200);z-index:0;\"><\u002Fdiv>\n\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 4px;animation:fadeInUp .5s ease both;animation-delay:0ms;\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#0B2545;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:11.5px;font-weight:600;line-height:1.3;margin:12px 0 0;text-align:center;max-width:96px;color:var(--color-text);\">Field leads<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 4px;animation:fadeInUp .5s ease both;animation-delay:100ms;\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#0E7490;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:11.5px;font-weight:600;line-height:1.3;margin:12px 0 0;text-align:center;max-width:96px;color:var(--color-text);\">Engagement activity<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 4px;animation:fadeInUp .5s ease both;animation-delay:200ms;\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:var(--color-accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"4\" y1=\"21\" x2=\"4\" y2=\"14\"><\u002Fline><line x1=\"4\" y1=\"10\" x2=\"4\" y2=\"3\"><\u002Fline><line x1=\"12\" y1=\"21\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"3\"><\u002Fline><line x1=\"20\" y1=\"21\" x2=\"20\" y2=\"16\"><\u002Fline><line x1=\"20\" y1=\"12\" x2=\"20\" y2=\"3\"><\u002Fline><\u002Fsvg><\u002Fdiv 0 0 1 0 2.8z\"><\u002Fpath><circle cx=\"7.5\" cy=\"7.5\" r=\"1.5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:11.5px;font-weight:600;line-height:1.3;margin:12px 0 0;text-align:center;max-width:96px;color:var(--color-text);\">Relevant offer<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;padding:0 4px;animation:fadeInUp .5s ease both;animation-delay:700ms;\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:var(--color-accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex:none;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 11.1V12a10 10 0 1 1-5.9-9.1\"><\u002Fpath><polyline points=\"22 4 12 14.1 9 11.1\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <p style=\"font-size:11.5px;font-weight:600;line-height:1.3;margin:12px 0 0;text-align:center;max-width:96px;color:var(--color-text);\">Conversion decision<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <h3 style=\"font-size:17px;font-weight:700;letter-spacing:-0.01em;color:var(--color-text);margin:36px 0 12px;\">My role<\u002Fh3>\n      <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Activated an existing competitor-lead database through a structured engagement journey<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Designed the intent-scoring approach and Low, Mid and High audience paths<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Structured the multichannel nurturing journey across CRM and customer service<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Defined the educational sequence, callback flow, offer timing and eligibility rules<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Owned post-launch performance analysis and used cross-channel insights to refine targeting, messaging, timing and subsequent waves<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.7;margin:0;padding-left:18px;position:relative;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-1px;top:3px;\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Managed development and implementation teams delivering the technical build<\u002Fp>\n    <\u002Farticle>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ APPROACH ============ -->\n  <section id=\"approach\" aria-label=\"How I work\" data-reveal=\"1\" style=\"background:var(--color-accent-100);\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:clamp(56px,8vw,88px) var(--edge);\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:32px;\">\n        <h2 style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(26px,3vw,38px);letter-spacing:-0.01em;margin:0;\">How I work<\u002Fh2>\n        <p style=\"font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--color-accent);margin:0;\">{{ approachCounter }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:stretch;gap:16px;margin-bottom:24px;\">\n        <button type=\"button\" aria-label=\"Previous step\" onclick=\"{{ prevApproach }}\" style=\"flex:none;width:48px;border:1px solid var(--color-accent-200);background:var(--color-surface);border-radius:var(--radius-md);cursor:pointer;color:var(--color-accent);font-size:18px;transition:all .15s ease;\" style-hover=\"background:var(--color-accent-200);\">←<\u002Fbutton>\n        <div key=\"{{ approachIndex }}\" style=\"flex:1;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--color-accent-900) 0%,var(--color-accent) 100%);color:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:36px 40px;min-height:170px;animation:cardIn .45s cubic-bezier(.22,1,.36,1) both;\">\n          <div style=\"position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0) 70%);pointer-events:none;\"><\u002Fdiv>\n          <div style=\"position:relative;display:flex;align-items:flex-start;gap:20px;\">\n            <div style=\"flex:none;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:18px;\">{{ approachCurrent.n }}<\u002Fdiv>\n            <div>\n              <p style=\"font-family:var(--font-heading);font-weight:600;font-size:20px;margin:0 0 8px;color:#fff;\">{{ approachCurrent.title }}<\u002Fp>\n              <p style=\"font-size:16.5px;line-height:1.55;margin:0;max-width:46ch;color:rgba(255,255,255,0.9);\">{{ approachCurrent.text }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"button\" aria-label=\"Next step\" onclick=\"{{ nextApproach }}\" style=\"flex:none;width:48px;border:1px solid var(--color-accent-200);background:var(--color-surface);border-radius:var(--radius-md);cursor:pointer;color:var(--color-accent);font-size:18px;transition:all .15s ease;\" style-hover=\"background:var(--color-accent-200);\">→<\u002Fbutton>\n      <\u002Fdiv>\n      <div role=\"tablist\" aria-label=\"Select a step\" style=\"display:flex;gap:8px;margin-bottom:8px;\">\n        <sc-for list=\"{{ approachDots }}\" as=\"d\" hint-placeholder-count=\"6\">\n          <button type=\"button\" aria-label=\"{{ d.label }}\" aria-selected=\"{{ d.active }}\" onclick=\"{{ d.select }}\" style=\"width:{{ d.width }};height:8px;border-radius:4px;border:0;background:{{ d.bg }};cursor:pointer;transition:all .25s ease;\" title=\"{{ d.label }}\"><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <\u002Fmain>\n\n  <!-- ============ CLOSING + CONTACT ============ -->\n  <section id=\"contact\" aria-label=\"Contact\" style=\"position:rela chMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (!reduce) {\n      this._revealObserver = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            this._revealObserver.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.1 });\n      document.querySelectorAll('[data-reveal]').forEach((el) => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(14px)';\n        el.style.transition = 'opacity .5s ease, transform .5s ease';\n        this._revealObserver.observe(el);\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._navObserver) this._navObserver.disconnect();\n    if (this._revealObserver) this._revealObserver.disconnect();\n  }\n\n  goApproach(i) { this.setState({ approachIndex: i }); }\n  nextApproach() { this.goApproach((this.state.approachIndex + 1) % 6); }\n  prevApproach() { this.goApproach((this.state.approachIndex + 5) % 6); }\n\n  toggleMobileMenu() { this.setState((s) => ({ mobileMenuOpen: !s.mobileMenuOpen })); }\n  closeMobileMenu() { this.setState({ mobileMenuOpen: false }); }\n  copyEmail() {\n    const email = this.props.email || 'd.danielmoyal@gmail.com';\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(email).then(() => {\n        this.setState({ emailCopied: true });\n        setTimeout(() => this.setState({ emailCopied: false }), 2000);\n      });\n    }\n  }\n  setCase(n) { this.setState({ activeCase: n }); }\n  setPersona(key) { this.setState({ activePersona: key }); }\n\n  renderVals() {\n    const st = this.state;\n    const NAV = [\n      { id: 'work', label: 'Work' },\n      { id: 'approach', label: 'Approach' },\n      { id: 'contact', label: 'Contact' }\n    ];\n    const navItems = NAV.map((n) => {\n      const active = st.activeNavId === n.id;\n      return {\n        href: '#' + n.id,\n        label: n.label,\n        color: active ? 'var(--color-accent)' : 'var(--color-text)',\n        borderColor: active ? 'var(--color-accent)' : 'transparent'\n      };\n    });\n\n    const PERSONAS = [\n      { key: 'converted', label: 'Fully converted', desc: 'Completed the conversion milestone. The journey shifts to adoption, loyalty and relevant next actions.' },\n      { key: 'progress', label: 'Conversion in progress', desc: 'Has not completed the expected milestone yet. The journey adds education, guidance or a next-best action.' },\n      { key: 'friction', label: 'Friction or service need', desc: \"A service interaction changes the plan. The next message may change, delay or pause while the customer gets support.\" }\n    ];\n    const personaList = PERSONAS.map((p) => ({\n      key: p.key, label: p.label,\n      active: st.activePersona === p.key,\n      bg: st.activePersona === p.key ? 'var(--color-accent)' : 'transparent',\n      color: st.activePersona === p.key ? '#fff' : 'var(--color-text)',\n      border: st.activePersona === p.key ? 'var(--color-accent)' : 'var(--color-divider)',\n      select: () => this.setPersona(p.key)\n    }));\n    const activePersonaDesc = (PERSONAS.find((p) => p.key === st.activePersona) || PERSONAS[0]).desc;\n\n    const howIWork = [\n      { n: '01', title: 'Define the problem', text: 'I start with the commercial goal and the constraints around it.' },\n      { n: '02', title: 'Map the behavior', text: 'I identify signals, milestones and the paths customers actually take.' },\n      { n: '03', title: 'Design the logic', text: 'I turn behavior into triggers, timing, channels and exit rules.' },\n      { n: '04', title: 'Build and implement', text: 'I manage development and implementation tasks with the developers.' },\n      { n: '05', title: 'Test and optimize', text: 'I use controlled experiments and cross-channel data to improve messaging, triggers and customer progression.' },\n      { n: '06', title: 'Measure and improve', text: 'I analyze the data and decide on optimization actions based on performance.' }\n    ];\n    const approachCurrent = howIWork[st.approachIndex] || howIWork[0];\n    const approachCounter = 'Step ' + (st.approachIndex + 1) + ' of ' + howIWork.length;\n    const approachDots = howIWork.map((_, i) => ({\n      label: 'Step ' + (i + 1),\n      active: i === st.approachIndex,\n      width: i === st.approachIndex ? '24px' : '8px',\n      bg: i === st.approachIndex ? 'var(--color-accent)' : 'var(--color-accent-200)',\n      select: () => this.goApproach(i)\n    }));\n\n    return {\n      scrollPct: st.scrollPct,\n      isMobile: st.isMobile, isDesktop: !st.isMobile,\n      mobileMenuOpen: st.mobileMenuOpen,\n      toggleMobileMenu: this.toggleMobileMenu,\n      closeMobileMenu: this.closeMobileMenu,\n      navItems,\n      linkedinUrl: this.props.linkedinUrl || '[LINKEDIN_URL]',\n      cvUrl: this.props.cvUrl || '[CV_URL]',\n      email: this.props.email || 'd.danielmoyal@gmail.com',\n      location: this.props.location || 'Tel Aviv, Israel',\n      emailCopied: st.emailCopied ? 'Copied' : 'Copy email',\n      copyEmail: this.copyEmail,\n      case1Active: st.activeCase === 1, case2Active: st.activeCase === 2,\n      goCase1: () => this.setCase(1), goCase2: () => this.setCase(2),\n      case1TabColor: st.activeCase === 1 ? '#fff' : 'var(--color-text)',\n      case1TabBg: st.activeCase === 1 ? 'var(--color-accent)' : 'transparent',\n      case2TabColor: st.activeCase === 2 ? '#fff' : 'var(--color-text)',\n      case2TabBg: st.activeCase === 2 ? 'var(--color-accent)' : 'transparent',\n      personaList, activePersonaDesc, howIWork,\n      approachIndex: st.approachIndex, approachCurrent, approachCounter, approachDots,\n      nextApproach: () => this.nextApproach(),\n      prevApproach: () => this.
